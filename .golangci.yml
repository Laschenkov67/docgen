run:
  timeout: 5m
  go: "1.22"

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gocyclo
    - bodyclose
    - errorlint
    - nilerr
    - unconvert
    - unparam

linters-settings:
  gocyclo:
    min-complexity: 18
  revive:
    rules:
      - name: exported
        arguments: [checkPrivateReceivers, sayRepetitiveInsteadOfStutters]

issues:
  exclude-rules:
    - path: _test\.go
      linters: [gocyclo, errcheck, unparam]